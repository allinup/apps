<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>扫描应用</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        @keyframes shine {
            0% { background-position: -100px; }
            100% { background-position: 200px; }
        }
        .shine-effect {
            position: relative;
            overflow: hidden;
        }
        .shine-effect::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            animation: shine 2s infinite;
        }
        .float-animation {
            animation: float 3s ease-in-out infinite;
        }
        .pulse-animation {
            animation: pulse 2s ease-in-out infinite;
        }
        .gradient-bg {
            background: linear-gradient(120deg, #84fab0 0%, #8fd3f4 100%);
        }
        .card-hover {
            transition: all 0.3s ease;
        }
        .card-hover:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
        .glass-effect {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .noise-bg {
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%' height='100%' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            opacity: 0.05;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-blue-50 to-purple-50 min-h-screen relative">
    <!-- 背景装饰 -->
    <div class="fixed inset-0 noise-bg pointer-events-none"></div>
    <div class="fixed top-20 left-10 w-32 h-32 bg-blue-200 rounded-full filter blur-3xl opacity-20"></div>
    <div class="fixed bottom-20 right-10 w-32 h-32 bg-purple-200 rounded-full filter blur-3xl opacity-20"></div>

    <!-- 状态栏 -->
    <div class="bg-gradient-to-r from-gray-900 to-black text-white px-4 py-1 flex justify-between items-center text-xs backdrop-blur-lg z-50 relative">
        <span class="flex items-center">
            <i class="fas fa-signal-stream mr-2"></i>
            9:41
        </span>
        <div class="flex items-center space-x-2">
            <i class="fas fa-signal"></i>
            <i class="fas fa-wifi"></i>
            <i class="fas fa-battery-full"></i>
        </div>
    </div>

    <!-- 主要内容区域 -->
    <div class="p-4 pb-20 relative z-10">
        <!-- 页面标题 -->
        <div class="mb-6">
            <h1 class="text-2xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-600 to-purple-600">
                智能扫描
            </h1>
            <p class="text-gray-500 text-sm mt-1">让扫描变得更简单</p>
        </div>

        <!-- 快捷功能区 -->
        <div class="grid grid-cols-2 gap-4 mb-6">
            <div class="bg-gradient-to-br from-blue-500 to-blue-600 p-4 rounded-xl shadow-lg flex flex-col items-center card-hover text-white shine-effect">
                <div class="w-12 h-12 rounded-full bg-white/20 flex items-center justify-center mb-3">
                    <i class="fas fa-file-alt text-2xl"></i>
                </div>
                <span class="text-sm font-medium">文档扫描</span>
                <span class="text-xs text-blue-100 mt-1">快速扫描文档</span>
            </div>
            <div class="bg-gradient-to-br from-green-500 to-green-600 p-4 rounded-xl shadow-lg flex flex-col items-center card-hover text-white shine-effect">
                <div class="w-12 h-12 rounded-full bg-white/20 flex items-center justify-center mb-3">
                    <i class="fas fa-id-card text-2xl"></i>
                </div>
                <span class="text-sm font-medium">证件扫描</span>
                <span class="text-xs text-green-100 mt-1">身份证/护照</span>
            </div>
            <div class="bg-gradient-to-br from-purple-500 to-purple-600 p-4 rounded-xl shadow-lg flex flex-col items-center card-hover text-white shine-effect">
                <div class="w-12 h-12 rounded-full bg-white/20 flex items-center justify-center mb-3">
                    <i class="fas fa-calculator text-2xl"></i>
                </div>
                <span class="text-sm font-medium">扫描计数</span>
                <span class="text-xs text-purple-100 mt-1">智能统计</span>
            </div>
            <div class="bg-gradient-to-br from-orange-500 to-orange-600 p-4 rounded-xl shadow-lg flex flex-col items-center card-hover text-white shine-effect">
                <div class="w-12 h-12 rounded-full bg-white/20 flex items-center justify-center mb-3">
                    <i class="fas fa-qrcode text-2xl"></i>
                </div>
                <span class="text-sm font-medium">二维码识别</span>
                <span class="text-xs text-orange-100 mt-1">快速识别</span>
            </div>
        </div>

        <!-- 工具箱区域 -->
        <div class="mb-6 bg-white/60 p-4 rounded-2xl backdrop-blur-md">
            <h2 class="text-lg font-medium mb-4 flex items-center">
                <div class="w-8 h-8 rounded-lg bg-indigo-500 flex items-center justify-center mr-2">
                    <i class="fas fa-toolbox text-white"></i>
                </div>
                <span class="bg-clip-text text-transparent bg-gradient-to-r from-indigo-500 to-purple-600">智能工具箱</span>
                <span class="ml-2 text-xs px-2 py-1 bg-indigo-100 text-indigo-600 rounded-full">8个工具</span>
            </h2>
            <div class="grid grid-cols-4 gap-3">
                <div class="bg-white p-3 rounded-xl shadow-sm flex flex-col items-center card-hover backdrop-blur-md bg-opacity-80">
                    <div class="w-10 h-10 rounded-full bg-gradient-to-br from-blue-100 to-blue-200 flex items-center justify-center mb-2 pulse-animation">
                        <i class="fas fa-ruler text-blue-500"></i>
                    </div>
                    <span class="text-xs font-medium">智能测距</span>
                </div>
                <div class="bg-white p-3 rounded-xl shadow-sm flex flex-col items-center card-hover backdrop-blur-md bg-opacity-80">
                    <div class="w-10 h-10 rounded-full bg-gradient-to-br from-green-100 to-green-200 flex items-center justify-center mb-2 pulse-animation">
                        <i class="fas fa-font text-green-500"></i>
                    </div>
                    <span class="text-xs font-medium">文字识别</span>
                </div>
                <div class="bg-white p-3 rounded-xl shadow-sm flex flex-col items-center card-hover backdrop-blur-md bg-opacity-80">
                    <div class="w-10 h-10 rounded-full bg-gradient-to-br from-purple-100 to-purple-200 flex items-center justify-center mb-2 pulse-animation">
                        <i class="fas fa-signature text-purple-500"></i>
                    </div>
                    <span class="text-xs font-medium">电子签名</span>
                </div>
                <div class="bg-white p-3 rounded-xl shadow-sm flex flex-col items-center card-hover backdrop-blur-md bg-opacity-80">
                    <div class="w-10 h-10 rounded-full bg-gradient-to-br from-orange-100 to-orange-200 flex items-center justify-center mb-2 pulse-animation">
                        <i class="fas fa-image text-orange-500"></i>
                    </div>
                    <span class="text-xs font-medium">图片水印</span>
                </div>
                <div class="bg-white p-3 rounded-xl shadow-sm flex flex-col items-center card-hover backdrop-blur-md bg-opacity-80">
                    <div class="w-10 h-10 rounded-full bg-gradient-to-br from-red-100 to-red-200 flex items-center justify-center mb-2 pulse-animation">
                        <i class="fas fa-language text-red-500"></i>
                    </div>
                    <span class="text-xs font-medium">拍照翻译</span>
                </div>
                <div class="bg-white p-3 rounded-xl shadow-sm flex flex-col items-center card-hover backdrop-blur-md bg-opacity-80">
                    <div class="w-10 h-10 rounded-full bg-gradient-to-br from-indigo-100 to-indigo-200 flex items-center justify-center mb-2 pulse-animation">
                        <i class="fas fa-file-image text-indigo-500"></i>
                    </div>
                    <span class="text-xs font-medium">PDF转图片</span>
                </div>
                <div class="bg-white p-3 rounded-xl shadow-sm flex flex-col items-center card-hover backdrop-blur-md bg-opacity-80">
                    <div class="w-10 h-10 rounded-full bg-gradient-to-br from-pink-100 to-pink-200 flex items-center justify-center mb-2 pulse-animation">
                        <i class="fas fa-file-pdf text-pink-500"></i>
                    </div>
                    <span class="text-xs font-medium">图片转PDF</span>
                </div>
                <div class="bg-white p-3 rounded-xl shadow-sm flex flex-col items-center card-hover backdrop-blur-md bg-opacity-80">
                    <div class="w-10 h-10 rounded-full bg-gradient-to-br from-cyan-100 to-cyan-200 flex items-center justify-center mb-2 pulse-animation">
                        <i class="fas fa-file-word text-cyan-500"></i>
                    </div>
                    <span class="text-xs font-medium">PDF转Word</span>
                </div>
            </div>
        </div>
    </div>

    <!-- 底部导航栏 -->
    <div class="fixed bottom-0 left-0 right-0 glass-effect border-t flex justify-between items-center px-12 py-2 shadow-lg z-50">
        <div class="flex flex-col items-center text-blue-500 card-hover">
            <div class="w-10 h-10 rounded-full bg-blue-50 flex items-center justify-center">
                <i class="fas fa-scanner text-xl"></i>
            </div>
            <span class="text-xs mt-1 font-medium">扫描</span>
        </div>
        <div class="bg-gradient-to-r from-blue-500 to-blue-600 w-16 h-16 rounded-full flex items-center justify-center -mt-8 shadow-lg float-animation shine-effect">
            <i class="fas fa-robot text-white text-2xl"></i>
        </div>
        <div class="flex flex-col items-center text-gray-400 card-hover">
            <div class="w-10 h-10 rounded-full bg-gray-50 flex items-center justify-center">
                <i class="fas fa-user text-xl"></i>
            </div>
            <span class="text-xs mt-1">我的</span>
        </div>
    </div>
</body>
</html>
